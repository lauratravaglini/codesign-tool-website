<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found &middot; CoDesign Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;800;900&display=swap" rel="stylesheet">
<style>
:root{--brand:#3F40A1;--brand-l:#ECECF7;--ink:#1B1B20;--ink-soft:#4A4A52;--paper:#FDFDFC;--hair:rgba(20,20,25,.09)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.n{font-size:120px;font-weight:900;letter-spacing:-.05em;color:var(--brand-l);line-height:1}
h1{font-size:32px;font-weight:800;letter-spacing:-.02em;margin:8px 0 14px}
p{font-size:16px;color:var(--ink-soft);max-width:40ch;line-height:1.65;margin-bottom:32px}
a{display:inline-flex;align-items:center;gap:8px;background:var(--brand);color:#fff;font-size:14px;font-weight:800;padding:12px 24px;border-radius:999px;text-decoration:none}
</style>
</head>
<body>
<div class="n">404</div>
<h1>Page not found</h1>
<p>The page you are looking for does not exist or has been moved.</p>
<a href="/">Go to the homepage</a>
</body>
</html>
