<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoDesign Tool — Coming Soon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0e0e14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* subtle noise grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* table felt glow */
  .table-glow {
    position: absolute;
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse at center, rgba(63,64,161,0.12) 0%, transparent 70%);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* ——— CARD STAGE ——— */
  .stage {
    position: relative;
    width: 420px;
    height: 280px;
    margin-bottom: 56px;
    z-index: 1;
  }

  .card {
    position: absolute;
    width: 72px;
    height: 100px;
    border-radius: 8px;
    background: #1c1c28;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    transform-origin: center bottom;
  }

  /* faint card-back pattern */
  .card::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.05);
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      rgba(255,255,255,0.02) 4px,
      rgba(255,255,255,0.02) 5px
    );
  }

  /* ——— HAND (fanned cards, left player) ——— */
  .hand-left  { left: 10px;  bottom: 20px; }
  .hand-right { right: 10px; bottom: 20px; }

  .hand-left  .card:nth-child(1) { transform: rotate(-18deg) translateY(10px); animation: fan-left-1  3.2s ease-in-out infinite; }
  .hand-left  .card:nth-child(2) { transform: rotate(-9deg)  translateY(4px);  animation: fan-left-2  3.2s ease-in-out infinite 0.1s; }
  .hand-left  .card:nth-child(3) { transform: rotate(0deg);                    animation: fan-left-3  3.2s ease-in-out infinite 0.2s; }
  .hand-left  .card:nth-child(4) { transform: rotate(9deg)   translateY(4px);  animation: fan-left-4  3.2s ease-in-out infinite 0.3s; }
  .hand-left  .card:nth-child(5) { transform: rotate(18deg)  translateY(10px); animation: fan-left-5  3.2s ease-in-out infinite 0.4s; }

  .hand-right .card:nth-child(1) { transform: rotate(18deg)  translateY(10px); animation: fan-right-1 3.5s ease-in-out infinite 0.6s; }
  .hand-right .card:nth-child(2) { transform: rotate(9deg)   translateY(4px);  animation: fan-right-2 3.5s ease-in-out infinite 0.7s; }
  .hand-right .card:nth-child(3) { transform: rotate(0deg);                    animation: fan-right-3 3.5s ease-in-out infinite 0.8s; }
  .hand-right .card:nth-child(4) { transform: rotate(-9deg)  translateY(4px);  animation: fan-right-4 3.5s ease-in-out infinite 0.9s; }

  /* ——— TABLE CARDS (played / face-down) ——— */
  .table-area { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }

  .table-card {
    position: absolute;
    width: 62px;
    height: 88px;
    border-radius: 7px;
    background: #1c1c28;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
  }

  .table-card::after {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.05);
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      rgba(255,255,255,0.02) 4px,
      rgba(255,255,255,0.02) 5px
    );
  }

  .tc1 { transform: rotate(-6deg)  translate(-70px, -10px); animation: table-wobble 4.1s ease-in-out infinite; }
  .tc2 { transform: rotate(3deg)   translate(-20px, 5px);   animation: table-wobble 4.1s ease-in-out infinite 0.5s; }
  .tc3 { transform: rotate(-2deg)  translate(30px,  -5px);  animation: table-wobble 4.1s ease-in-out infinite 1s; }

  /* ——— FLYING CARD (being played) ——— */
  .flying-card {
    position: absolute;
    width: 62px;
    height: 88px;
    border-radius: 7px;
    background: #1c1c28;
    border: 1px solid rgba(63,64,161,0.4);
    box-shadow: 0 0 20px rgba(63,64,161,0.3), 0 8px 24px rgba(0,0,0,0.6);
    left: 50%;
    top: 50%;
    animation: fly-card 3.8s ease-in-out infinite;
  }

  .flying-card::after {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 3px;
    border: 1px solid rgba(63,64,161,0.2);
  }

  /* ——— DECK (stack on right side) ——— */
  .deck { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); }

  .deck-card {
    position: absolute;
    width: 62px;
    height: 88px;
    border-radius: 7px;
    background: #1a1a26;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    animation: deck-breathe 5s ease-in-out infinite;
  }

  .deck-card:nth-child(1) { top: 0;   left: 0; }
  .deck-card:nth-child(2) { top: -2px; left: 1px; }
  .deck-card:nth-child(3) { top: -4px; left: 2px; }
  .deck-card:nth-child(4) { top: -6px; left: 3px; }
  .deck-card:nth-child(5) { top: -8px; left: 4px; animation-delay: 0.3s; }

  /* ——— ANIMATIONS ——— */

  @keyframes fan-left-1 {
    0%,100% { transform: rotate(-18deg) translateY(10px); }
    40%      { transform: rotate(-22deg) translateY(14px); }
    70%      { transform: rotate(-14deg) translateY(6px); }
  }
  @keyframes fan-left-2 {
    0%,100% { transform: rotate(-9deg) translateY(4px); }
    40%     { transform: rotate(-12deg) translateY(7px); }
    70%     { transform: rotate(-6deg)  translateY(2px); }
  }
  @keyframes fan-left-3 {
    0%,100% { transform: rotate(0deg) translateY(0px); }
    40%     { transform: rotate(-3deg) translateY(3px); }
    70%     { transform: rotate(3deg)  translateY(-2px); }
  }
  @keyframes fan-left-4 {
    0%,100% { transform: rotate(9deg) translateY(4px); }
    40%     { transform: rotate(6deg)  translateY(2px); }
    70%     { transform: rotate(12deg) translateY(7px); }
  }
  @keyframes fan-left-5 {
    0%,100% { transform: rotate(18deg) translateY(10px); }
    40%     { transform: rotate(14deg) translateY(6px); }
    70%     { transform: rotate(22deg) translateY(14px); }
  }

  @keyframes fan-right-1 {
    0%,100% { transform: rotate(18deg)  translateY(10px); }
    50%     { transform: rotate(22deg)  translateY(14px); }
  }
  @keyframes fan-right-2 {
    0%,100% { transform: rotate(9deg)   translateY(4px); }
    50%     { transform: rotate(12deg)  translateY(7px); }
  }
  @keyframes fan-right-3 {
    0%,100% { transform: rotate(0deg); }
    50%     { transform: rotate(-4deg) translateY(3px); }
  }
  @keyframes fan-right-4 {
    0%,100% { transform: rotate(-9deg)  translateY(4px); }
    50%     { transform: rotate(-13deg) translateY(8px); }
  }

  @keyframes table-wobble {
    0%,100% { opacity: 0.7; }
    50%     { opacity: 0.9; }
  }

  @keyframes fly-card {
    0%   { transform: translate(-50%, -50%) rotate(-5deg) scale(0.9); opacity: 0.3; }
    20%  { transform: translate(-50%, -80%) rotate(8deg)  scale(1.05); opacity: 1; }
    50%  { transform: translate(-50%, -50%) rotate(-2deg) scale(1); opacity: 1; }
    80%  { transform: translate(-50%, -30%) rotate(5deg)  scale(0.95); opacity: 0.8; }
    100% { transform: translate(-50%, -50%) rotate(-5deg) scale(0.9); opacity: 0.3; }
  }

  @keyframes deck-breathe {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-3px); }
  }

  /* ——— HAND CONTAINERS ——— */
  .hand {
    position: absolute;
    bottom: 0;
    display: flex;
  }

  .hand-left  { left: 0; }
  .hand-right { right: 0; }

  /* ——— TEXT ——— */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  h1 span {
    color: #6162d8;
  }

  p {
    font-size: 15px;
    color: rgba(255,255,255,0.35);
    line-height: 1.6;
    max-width: 320px;
    margin: 0 auto;
  }

  .dots {
    display: inline-flex;
    gap: 6px;
    margin-top: 32px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #6162d8;
    opacity: 0.3;
    animation: dot-pulse 1.6s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%,100% { opacity: 0.2; transform: scale(0.8); }
    50%     { opacity: 1;   transform: scale(1.1); }
  }
</style>
</head>
<body>

<div class="table-glow"></div>

<!-- Card stage -->
<div class="stage">

  <!-- Left hand -->
  <div class="hand hand-left">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </div>

  <!-- Right hand -->
  <div class="hand hand-right">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </div>

  <!-- Table cards (played) -->
  <div class="table-area">
    <div class="table-card tc1"></div>
    <div class="table-card tc2"></div>
    <div class="table-card tc3"></div>
  </div>

  <!-- Card being played -->
  <div class="flying-card"></div>

  <!-- Deck -->
  <div class="deck">
    <div class="deck-card"></div>
    <div class="deck-card"></div>
    <div class="deck-card"></div>
    <div class="deck-card"></div>
    <div class="deck-card"></div>
  </div>

</div>

<!-- Text -->
<div class="content">
  <div class="logo-text">CoDesign Tool</div>
  <h1>We're setting up<br>the <span>table</span>.</h1>
  <p>Something new is being dealt. Check back soon.</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

</body>
</html>
